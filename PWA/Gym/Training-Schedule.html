<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول التمارين — برنامج 4 أيام</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#161a23;
    --panel-2:#1c212c;
    --line:rgba(255,255,255,0.08);
    --txt:#eef0f4;
    --txt-dim:#9aa1b0;
    --accent:#ff6a3d;
    --accent-2:#ffb454;
    --accent-soft:rgba(255,106,61,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Tahoma','Segoe UI',sans-serif;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,106,61,0.10), transparent 60%),
      radial-gradient(700px 500px at 0% 100%, rgba(255,180,84,0.06), transparent 60%),
      var(--bg);
    color:var(--txt);
    min-height:100vh;
    padding-bottom:60px;
  }

  .topbar{
    position:sticky; top:0; z-index:50;
    background:rgba(11,13,18,0.9);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1100px; margin:0 auto; padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-size:22px; flex-shrink:0;
  }
  .brand-text h1{font-size:1.05em; font-weight:800;}
  .brand-text span{font-size:.78em; color:var(--txt-dim);}

  .progress-pill{
    font-size:.8em; color:var(--txt-dim);
    background:var(--panel); border:1px solid var(--line);
    border-radius:30px; padding:8px 16px; white-space:nowrap;
  }
  .progress-pill b{color:var(--accent-2);}

  .hero{max-width:1100px; margin:0 auto; padding:36px 20px 6px;}
  .hero h2{
    font-size:2em; font-weight:800; line-height:1.3;
    background:linear-gradient(90deg,#fff,#cfd3dd);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero p{color:var(--txt-dim); margin-top:8px; font-size:1em; max-width:640px;}
  .hero-stats{display:flex; gap:14px; margin-top:22px; flex-wrap:wrap;}
  .hstat{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px 20px; min-width:110px;}
  .hstat b{display:block; font-size:1.4em; color:var(--accent-2);}
  .hstat span{font-size:.76em; color:var(--txt-dim);}

  .tabs-wrap{max-width:1100px; margin:26px auto 0; padding:0 20px;}
  .tabs{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto; background:var(--panel); border:1px solid var(--line);
    color:var(--txt-dim); border-radius:14px; padding:14px 22px;
    cursor:pointer; text-align:center; transition:all .25s ease; user-select:none;
  }
  .tab .t-day{display:block; font-weight:800; font-size:1em; color:var(--txt);}
  .tab .t-focus{display:block; font-size:.76em; margin-top:3px;}
  .tab .t-count{display:block; font-size:.7em; margin-top:6px; color:var(--accent-2);}
  .tab.active{
    background:linear-gradient(135deg,var(--accent-soft),rgba(255,180,84,0.08));
    border-color:var(--accent); box-shadow:0 8px 24px rgba(255,106,61,0.18);
  }
  .tab.active .t-day{color:var(--accent-2);}

  .day-panel{display:none; max-width:1100px; margin:0 auto; padding:26px 20px 0;}
  .day-panel.active{display:block;}
  .day-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:8px;}
  .day-head h3{font-size:1.25em; font-weight:800;}
  .day-head .day-sub{color:var(--txt-dim); font-size:.86em;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:18px;}

  .card{
    background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%);
    border:1px solid var(--line); border-radius:18px; overflow:hidden;
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    display:flex; flex-direction:column;
  }
  .card:hover{
    transform:translateY(-4px); border-color:rgba(255,106,61,0.4);
    box-shadow:0 16px 32px rgba(0,0,0,0.35);
  }

  .card-top{display:flex; align-items:center; gap:12px; padding:16px 16px 0;}
  .num{
    width:30px;height:30px;border-radius:9px; background:var(--accent-soft); color:var(--accent-2);
    display:flex;align-items:center;justify-content:center; font-weight:800; font-size:.85em;
    flex-shrink:0; border:1px solid rgba(255,106,61,0.3);
  }
  .card-top h4{font-size:1.1em; font-weight:800;}

  .img-box{
    margin:12px 16px 0; background:#fff; border:1px solid var(--line); border-radius:14px;
    overflow:hidden; height:170px; position:relative; display:flex; align-items:center; justify-content:center;
  }
  .img-box img{width:100%; height:100%; object-fit:contain; background:#fff;}
  .img-fallback{
    color:#888; font-size:.78em; text-align:center; padding:10px;
  }

  .card-body{padding:14px 16px 16px; display:flex; flex-direction:column; gap:10px; flex:1;}

  .metrics{
    display:flex; border:1px solid rgba(255,180,84,0.25);
    background:linear-gradient(135deg, rgba(255,180,84,0.08), rgba(255,180,84,0.02));
    border-radius:12px; overflow:hidden;
  }
  .metric{flex:1; text-align:center; padding:10px 6px;}
  .metric + .metric{border-right:1px solid rgba(255,180,84,0.2);}
  .metric .m-label{font-size:.7em; color:var(--accent-2); font-weight:700; margin-bottom:3px;}
  .metric .m-value{font-size:1.22em; font-weight:800; color:var(--txt);}

  .equip-row{
    display:flex; align-items:flex-start; gap:8px; background:rgba(255,255,255,0.03);
    border:1px solid var(--line); border-radius:10px; padding:9px 12px; font-size:.83em; color:var(--txt-dim);
  }
  .equip-row .e-ic{flex-shrink:0; font-size:1.05em;}
  .equip-row b{color:var(--txt); font-weight:700;}

  .tags{display:flex; gap:6px; flex-wrap:wrap;}
  .tag{
    font-size:.74em; padding:4px 11px; border-radius:30px; background:rgba(255,255,255,0.06);
    color:var(--accent-2); border:1px solid rgba(255,255,255,0.08);
  }

  .footer{max-width:1100px; margin:46px auto 0; padding:0 20px;}
  .footer-card{
    background:linear-gradient(135deg, var(--accent-soft), rgba(255,180,84,0.05));
    border:1px solid rgba(255,106,61,0.3); border-radius:20px; padding:28px; text-align:center;
  }
  .footer-card p{font-size:1.1em; font-weight:700; margin-bottom:14px;}
  .coach-badge{
    display:inline-flex; align-items:center; gap:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#1a0e08; font-weight:800; padding:10px 22px; border-radius:30px; font-size:.95em;
  }

  @media (max-width: 560px){
    .hero h2{font-size:1.5em;}
    .topbar-inner{padding:14px 16px;}
    .brand-text h1{font-size:.95em;}
    .progress-pill{display:none;}
  }

  .tab:focus-visible, .card:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">🏋️</div>
        <div class="brand-text">
          <h1>جدول التمارين الرياضية</h1>
          <span>برنامج تدريبي مقسم على 4 أيام</span>
        </div>
      </div>
      <div class="progress-pill">إجمالي التمارين: <b id="totalCount">0</b></div>
    </div>
  </div>

  <div class="hero">
    <h2>خطّتك الأسبوعية كاملة في مكان واحد</h2>
    <p>كل تمرين معروض بصورة توضيحية حقيقية، عدد المجموعات والتكرارات، الجهاز المطلوب، والعضلة المستهدفة. اختر اليوم من الأسفل وابدأ.</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs" role="tablist"></div>
  </div>

  <div id="panels"></div>

  <div class="footer">
    <div class="footer-card">
      <p>💪 استمرارية + صبر = نتائج مبهرة</p>
    </div>
  </div>

<script>

        {name:"رفرفة جانبية", sets:3, reps:"12-15", equipment:"دمبل (Dumbbell Lateral Raise)", muscles:["الكتف الجانبي"], img:"dumbbell_lateral_raise"},
        {name:"جهاز كتف", sets:3, reps:"10-12", equipment:"جهاز ضغط الكتف (Shoulder Press Machine)", muscles:["الكتف","الترايسبس"], img:"shoulder_press_machine"},
        {name:"باي دمبل", sets:3, reps:"10-12", equipment:"دمبل (Dumbbell Bicep Curl)", muscles:["البايسبس"], img:"dumbbell_bicep_curl"},
        {name:"تراي حبل", sets:3, reps:"12-15", equipment:"جهاز كابل + حبل (Cable + Rope)", muscles:["الترايسبس"], img:"tricep_rope_pushdown"},
        {name:"أمامي رجل", sets:3, reps:"12-15", equipment:"جهاز تمدد الرجل (Leg Extension)", muscles:["الرباعية"], img:"leg_extension"},
        {name:"خلفي جهاز", sets:4, reps:"10-12", equipment:"جهاز سحب خلفي (Seated Row)", muscles:["الظهر الأوسط"], img:"seated_row"}
      ]
    },
    {
      name: "اليوم الثاني", focus: "صدر، كتف وترايسبس",
      exercises: [
        {name:"بوش", sets:3, reps:"12-15", equipment:"كرة بوسو (Bosu Ball)", muscles:["الكور","التوازن"], img:"bosu_plank"},
        {name:"بار عالي", sets:4, reps:"8-12", equipment:"بار علوي للتعليق (Pull Up Bar)", muscles:["الظهر","البايسبس"], img:"pull_up_bar"},
        {name:"دفع واطي", sets:4, reps:"8-10", equipment:"مقعد مائل سفلي + بار (Decline Bench)", muscles:["الصدر السفلي"], img:"decline_bench"},
        {name:"فراشة", sets:3, reps:"12-15", equipment:"دمبل + مقعد (Dumbbell Fly)", muscles:["الصدر","الداخلية"], img:"dumbbell_fly"},
        {name:"كابل كروس", sets:3, reps:"12-15", equipment:"جهاز كابل كروس أوفر (Cable Crossover)", muscles:["الصدر","الداخلية"], img:"cable_crossover"},
        {name:"رفرفة جانبية", sets:3, reps:"12-15", equipment:"دمبل (Dumbbell Lateral Raise)", muscles:["الكتف الجانبي"], img:"dumbbell_lateral_raise"},
        {name:"رفرفة أمامية", sets:3, reps:"12-15", equipment:"دمبل (Dumbbell Front Raise)", muscles:["الكتف الأمامي"], img:"dumbbell_front_raise"},
        {name:"تراي فرنساوي", sets:3, reps:"10-12", equipment:"بار EZ + مقعد (EZ Bar + Bench)", muscles:["الترايسبس"], img:"ez_bar_french_press"},

    },

      name: "اليوم الثالث", focus: "ظهر وبايسبس",
      exercises: [

        {name:"سحب أمامي", sets:4, reps:"10-12", equipment:"جهاز سحب أمامي (Lat Pulldown)", muscles:["الظهر","العضلة القريعة"], img:"lat_pulldown_wide"},
        {name:"تعريض", sets:3, reps:"10-12", equipment:"بار أولمبي واسع (Wide Grip Barbell Curl)", muscles:["البايسبس"], img:"wide_grip_barbell_curl"},
        {name:"سحب بار ع المعدة", sets:4, reps:"8-10", equipment:"بار أولمبي (Barbell Bent Over Row)", muscles:["الظهر","البايسبس"], img:"bent_over_row"},
        {name:"قطنية", sets:3, reps:"12-15", equipment:"جهاز الظهر القطني (Back Extension)", muscles:["الظهر السفلي"], img:"back_extension"},

      ]

      name: "اليوم الرابع", focus: "رجل وبطن",
      exercises: [
        {name:"رجل", sets:4, reps:"10-12", equipment:"جهاز خلف الرجل (Leg Curl)", muscles:["الأوتار","الفخذ الخلفي"], img:"leg_curl"},

        {name:"دفع 11", sets:4, reps:"8-10", equipment:"جهاز ضغط الصدر (Incline Press)", muscles:["الصدر العلوي"], img:"incline_press_machine"},
        {name:"خلفي جهاز", sets:4, reps:"10-12", equipment:"جهاز سحب خلفي (Seated Row)", muscles:["الظهر الأوسط"], img:"seated_row"},

        {name:"اسكواد سبعة", sets:4, reps:"8-10", equipment:"بدون أجهزة / بار (Squat)", muscles:["الفخذ","الأرداف"], img:"barbell_squat"},

const EQUIP_ICON = (name)=>{
  if(name.includes('بار')) return '🏋️';
  if(name.includes('دمبل')) return '🔩';
  if(name.includes('جهاز')) return '⚙️';
  if(name.includes('كرة')) return '🟠';
  if(name.includes('بدون')) return '🤸';
  return '🔧';
};

function render(){
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');
  const heroStats = document.getElementById('heroStats');
  let total = 0;

  DATA.days.forEach((day, i) => {
    total += day.exercises.length;

    const tab = document.createElement('div');
    tab.className = 'tab' + (i===0 ? ' active' : '');
    tab.setAttribute('role','tab');
    tab.tabIndex = 0;
    tab.dataset.idx = i;
    tab.innerHTML = `<span class="t-day">${day.name}</span><span class="t-focus">${day.focus}</span><span class="t-count">${day.exercises.length} تمارين</span>`;
    tab.addEventListener('click', () => switchDay(i));
    tab.addEventListener('keypress', (e)=>{ if(e.key==='Enter') switchDay(i); });
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i===0 ? ' active' : '');
    panel.id = 'panel-' + i;

    const head = document.createElement('div');
    head.className = 'day-head';
    head.innerHTML = `<h3>${day.name}</h3><span class="day-sub">التركيز: ${day.focus} · ${day.exercises.length} تمارين</span>`;
    panel.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'grid';

    day.exercises.forEach((ex, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      const imgUrl = IMG[ex.img] || '';
      card.innerHTML = `
        <div class="card-top">
          <div class="num">${idx+1}</div>
          <h4>${ex.name}</h4>
        </div>
        <div class="img-box">
          <img src="${imgUrl}" alt="${ex.name}" loading="lazy"
               onerror="this.onerror=null; this.parentElement.innerHTML='<div class=&quot;img-fallback&quot;>📷 الصورة غير متاحة حاليًا<br>${ex.equipment}</div>';">
        </div>
        <div class="card-body">
          <div class="metrics">
            <div class="metric"><div class="m-label">المجموعات</div><div class="m-value">${ex.sets}</div></div>
            <div class="metric"><div class="m-label">التكرارات</div><div class="m-value">${ex.reps}</div></div>
          </div>
          <div class="equip-row"><span class="e-ic">${EQUIP_ICON(ex.equipment)}</span><span><b>الجهاز:</b> ${ex.equipment}</span></div>
          <div class="tags">${ex.muscles.map(m=>`<span class="tag">${m}</span>`).join('')}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    panel.appendChild(grid);
    panelsEl.appendChild(panel);
  });

  document.getElementById('totalCount').textContent = total;

  heroStats.innerHTML = `
    <div class="hstat"><b>${DATA.days.length}</b><span>أيام تمرين</span></div>
    <div class="hstat"><b>${total}</b><span>تمرين إجمالي</span></div>
    <div class="hstat"><b>${DATA.days.reduce((s,d)=>s+d.exercises.reduce((a,e)=>a+e.sets,0),0)}</b><span>مجموعة إجمالية</span></div>
  `;
}

function switchDay(i){
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active', idx===i));
  document.querySelectorAll('.day-panel').forEach((p,idx)=>p.classList.toggle('active', idx===i));
  window.scrollTo({top: document.querySelector('.tabs-wrap').offsetTop - 80, behavior:'smooth'});
}

render();
</script>
</body>
</html>
