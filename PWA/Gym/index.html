    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e94560;
            --secondary: #0f3460;
            --dark: #1a1a2e;
            --light: #16213e;
            --text: #eaeaea;
            --success: #00d9ff;
            --warning: #ffc107;
            --danger: #ff4757;
        }

        @font-face {
            font-family: 'Cairo';
            src: url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--light) 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.1) 0%, transparent 70%);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Header */
        .header {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: '💪';
            font-size: 2rem;
        }

        .header-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--success);
        }

        .stat-label {
            color: #888;
            font-size: 0.8rem;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .nav-tab {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .nav-tab:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .nav-tab.active {
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        /* Sections */
        .section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: #aaa;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            padding: 0.8rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.2);
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #ff6b6b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #00a8ff 100%);
            color: var(--dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        /* Members List */
        .search-box {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text);
            font-size: 1rem;
        }

        .members-grid {
            display: grid;
            gap: 1rem;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .member-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--success);
        }

        .member-card.expired::before {
            background: var(--danger);
        }

        .member-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .member-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text);
        }

        .member-phone {
            color: #888;
            font-size: 0.9rem;
        }

        .member-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-active {
            background: rgba(0, 217, 255, 0.2);
            color: var(--success);
        }

        .status-expired {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .member-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.8rem;
            color: #888;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text);
        }

        .member-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* Attendance Section */
        .attendance-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            position: relative;
        }

        .calendar-day:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .calendar-day.present {
            background: var(--success);
            color: var(--dark);
            font-weight: bold;
        }

        .calendar-day.today {
            border: 2px solid var(--primary);
        }

        .attendance-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1rem;
        }

        .attendance-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 0.5rem;
            border-radius: 8px;
            border-right: 3px solid var(--success);
        }

        /* Stats Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-desc {
            color: #888;
            font-size: 0.9rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--light);
            padding: 2rem;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: modalSlide 0.3s;
        }

        @keyframes modalSlide {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--secondary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
            color: var(--dark);
        }

        .toast.error {
            background: var(--danger);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-stats {
                display: none;
            }
            
            .nav-tabs {
                flex-wrap: wrap;
            }
            
            .nav-tab {
                flex: 1 1 calc(50% - 0.25rem);
                font-size: 0.9rem;
                padding: 0.8rem;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Print Styles */
        @media print {
            .header, .nav-tabs, .btn, .member-actions {
                display: none !important;
            }
            
            .member-card {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">Gym Pro</div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalMembers">0</div>
                    <div class="stat-label">إجمالي المشتركين</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="activeMembers">0</div>
                    <div class="stat-label">الاشتراكات النشطة</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="todayAttendance">0</div>
                    <div class="stat-label">الحضور اليوم</div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Navigation -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('dashboard')">
                <span>📊</span> لوحة التحكم
            </button>
            <button class="nav-tab" onclick="showSection('addMember')">
                <span>➕</span> إضافة مشترك
            </button>
            <button class="nav-tab" onclick="showSection('members')">
                <span>👥</span> قائمة المشتركين
            </button>
            <button class="nav-tab" onclick="showSection('attendance')">
                <span>✅</span> تسجيل الحضور
            </button>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard" class="section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-number" id="totalRevenue">0</div>
                    <div class="stat-desc">إجمالي الإيرادات (جنية)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-number" id="expiringSoon">0</div>
                    <div class="stat-desc">تنتهي خلال 7 أيام</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-number" id="expiredCount">0</div>
                    <div class="stat-desc">اشتراكات منتهية</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-number" id="monthlyRevenue">0</div>
                    <div class="stat-desc">إيرادات هذا الشهر</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">⚡ آخر النشاطات</div>
                <div id="recentActivity" style="max-height: 300px; overflow-y: auto;">
                    <p style="text-align: center; color: #888; padding: 2rem;">لا توجد نشاطات حديثة</p>
                </div>
            </div>
        </div>

        <!-- Add Member Section -->
        <div id="addMember" class="section">
            <div class="card">
                <div class="card-title">📝 تسجيل مشترك جديد</div>
                <form id="addMemberForm" onsubmit="saveMember(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>رقم الهاتف *</label>
                            <input type="tel" id="phone" required placeholder="01xxxxxxxxx" pattern="[0-9]{11}">
                        </div>
                        <div class="form-group">
                            <label>الاسم بالكامل *</label>
                            <input type="text" id="name" required placeholder="اسم المشترك">
                        </div>
                        <div class="form-group">
                            <label>تاريخ بدء الاشتراك *</label>
                            <input type="date" id="startDate" required>
                        </div>
                        <div class="form-group">
                            <label>عدد أشهر الاشتراك *</label>
                            <input type="number" id="duration" required min="1" value="1" onchange="calculateEndDate()">
                        </div>
                        <div class="form-group">
                            <label>تاريخ الانتهاء (تلقائي)</label>
                            <input type="date" id="endDate" readonly style="background: rgba(0,0,0,0.3);">
                        </div>
                        <div class="form-group">
                            <label>المبلغ الإجمالي (جنية) *</label>
                            <input type="number" id="totalAmount" required min="0" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>المبلغ المدفوع *</label>
                            <input type="number" id="paidAmount" required min="0" placeholder="0" oninput="calculateRemaining()">
                        </div>
                        <div class="form-group">
                            <label>المبلغ المتبقي (تلقائي)</label>
                            <input type="number" id="remainingAmount" readonly style="background: rgba(0,0,0,0.3);">
                        </div>
                    </div>
                    <div style="margin-top: 1.5rem; text-align: center;">
                        <button type="submit" class="btn btn-primary" style="width: 100%; max-width: 300px;">
                            <span>💾</span> حفظ البيانات
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Members List Section -->
        <div id="members" class="section">
            <div class="card">
                <div class="card-title">👥 إدارة المشتركين</div>
                <input type="text" class="search-box" id="searchMembers" placeholder="🔍 ابحث برقم الهاتف أو الاسم..." oninput="filterMembers()">
                
                <div style="margin-bottom: 1rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                    <button class="btn btn-sm btn-primary" onclick="filterByStatus('all')">الكل</button>
                    <button class="btn btn-sm btn-success" onclick="filterByStatus('active')">نشط</button>
                    <button class="btn btn-sm btn-danger" onclick="filterByStatus('expired')">منتهي</button>
                </div>

                <div class="members-grid" id="membersList">
                    <!-- Members will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Attendance Section -->
        <div id="attendance" class="section">
            <div class="card">
                <div class="card-title">✅ تسجيل الحضور اليومي</div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>اختر المشترك</label>
                    <select id="attendanceMember" class="search-box" style="margin-bottom: 0;">
                        <option value="">-- اختر مشترك --</option>
                    </select>
                </div>
                <button class="btn btn-success" onclick="markAttendance()" style="width: 100%; margin-bottom: 2rem;">
                    <span>✓</span> تسجيل حضور الآن (<span id="currentTime"></span>)
                </button>

                <div id="attendanceDetails" style="display: none;">
                    <div class="card-title">📊 سجل الحضور</div>
                    <div class="attendance-calendar" id="attendanceCalendar"></div>
                    <div class="attendance-list" id="attendanceList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Member Details -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">تفاصيل المشترك</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script>
        // Data Management
        let members = JSON.parse(localStorage.getItem('gymMembers')) || [];
        let attendance = JSON.parse(localStorage.getItem('gymAttendance')) || {};
        let currentFilter = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
            renderMembers();
            updateAttendanceSelect();
            setInterval(updateCurrentTime, 1000);
            updateCurrentTime();
            
            // Set today's date as default
            document.getElementById('startDate').valueAsDate = new Date();
            calculateEndDate();
        });

        // Navigation
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.target.closest('.nav-tab').classList.add('active');
            
            if (sectionId === 'members') renderMembers();
            if (sectionId === 'dashboard') updateStats();
            if (sectionId === 'attendance') updateAttendanceSelect();
        }

        // Date Calculations
        function calculateEndDate() {
            const startDate = document.getElementById('startDate').value;
            const duration = parseInt(document.getElementById('duration').value) || 1;
            
            if (startDate) {
                const start = new Date(startDate);
                const end = new Date(start);
                end.setMonth(end.getMonth() + duration);
                document.getElementById('endDate').value = end.toISOString().split('T')[0];
            }
        }

        function calculateRemaining() {
            const total = parseFloat(document.getElementById('totalAmount').value) || 0;
            const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
            document.getElementById('remainingAmount').value = total - paid;
        }

        // Save Member
        function saveMember(e) {
            e.preventDefault();
            
            const member = {
                id: Date.now(),
                phone: document.getElementById('phone').value,
                name: document.getElementById('name').value,
                startDate: document.getElementById('startDate').value,
                duration: parseInt(document.getElementById('duration').value),
                endDate: document.getElementById('endDate').value,
                totalAmount: parseFloat(document.getElementById('totalAmount').value),
                paidAmount: parseFloat(document.getElementById('paidAmount').value),
                remainingAmount: parseFloat(document.getElementById('remainingAmount').value),
                createdAt: new Date().toISOString()
            };

            // Check if phone exists
            const existingIndex = members.findIndex(m => m.phone === member.phone);
            if (existingIndex !== -1) {
                if (confirm('هذا الرقم مسجل مسبقاً. هل تريد تحديث البيانات؟')) {
                    members[existingIndex] = member;
                } else {
                    return;
                }
            } else {
                members.push(member);
            }

            localStorage.setItem('gymMembers', JSON.stringify(members));
            showToast('تم حفظ البيانات بنجاح!', 'success');
            document.getElementById('addMemberForm').reset();
            
            // Reset dates
            document.getElementById('startDate').valueAsDate = new Date();
            calculateEndDate();
            
            updateStats();
        }

        // Render Members
        function renderMembers() {
            const container = document.getElementById('membersList');
            const searchTerm = document.getElementById('searchMembers').value.toLowerCase();
            
            let filtered = members.filter(m => {
                const matchesSearch = m.name.toLowerCase().includes(searchTerm) || 
                                    m.phone.includes(searchTerm);
                const isExpired = new Date(m.endDate) < new Date();
                
                if (currentFilter === 'active') return matchesSearch && !isExpired;
                if (currentFilter === 'expired') return matchesSearch && isExpired;
                return matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #888; padding: 3rem;">لا يوجد مشتركين</p>';
                return;
            }

            container.innerHTML = filtered.map(member => {
                const isExpired = new Date(member.endDate) < new Date();
                const daysLeft = Math.ceil((new Date(member.endDate) - new Date()) / (1000 * 60 * 60 * 24));
                
                return `
                    <div class="member-card ${isExpired ? 'expired' : ''}">
                        <div class="member-header">
                            <div>
                                <div class="member-name">${member.name}</div>
                                <div class="member-phone">📱 ${member.phone}</div>
                            </div>
                            <span class="member-status ${isExpired ? 'status-expired' : 'status-active'}">
                                ${isExpired ? 'منتهي' : 'نشط'}
                            </span>
                        </div>
                        
                        <div class="member-details">
                            <div class="detail-item">
                                <span class="detail-label">تاريخ الانتهاء</span>
                                <span class="detail-value">${member.endDate}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">الأيام المتبقية</span>
                                <span class="detail-value" style="color: ${daysLeft <= 7 ? 'var(--danger)' : 'var(--success)'}">
                                    ${isExpired ? 'منتهي' : daysLeft + ' يوم'}
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">المبلغ المتبقي</span>
                                <span class="detail-value" style="color: ${member.remainingAmount > 0 ? 'var(--warning)' : 'var(--success)'}">
                                    ${member.remainingAmount} ج.م
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">المدة</span>
                                <span class="detail-value">${member.duration} شهر</span>
                            </div>
                        </div>
                        
                        <div class="member-actions">
                            <button class="btn btn-sm btn-success" onclick="quickAttendance(${member.id})">
                                ✅ حضور
                            </button>
                            <button class="btn btn-sm btn-primary" onclick="viewMember(${member.id})">
                                👁 عرض
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteMember(${member.id})">
                                🗑 حذف
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Filter Functions
        function filterMembers() {
            renderMembers();
        }

        function filterByStatus(status) {
            currentFilter = status;
            renderMembers();
        }

        // Attendance Functions
        function updateCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('currentTime').textContent = timeString;
        }

        function updateAttendanceSelect() {
            const select = document.getElementById('attendanceMember');
            const activeMembers = members.filter(m => new Date(m.endDate) >= new Date());
            
            select.innerHTML = '<option value="">-- اختر مشترك --</option>' +
                activeMembers.map(m => `<option value="${m.id}">${m.name} - ${m.phone}</option>`).join('');
        }

        function markAttendance() {
            const memberId = document.getElementById('attendanceMember').value;
            if (!memberId) {
                showToast('الرجاء اختيار مشترك أولاً', 'error');
                return;
            }

            const today = new Date().toISOString().split('T')[0];
            const now = new Date();
            
            if (!attendance[memberId]) {
                attendance[memberId] = [];
            }

            // Check if already marked today
            if (attendance[memberId].some(a => a.date === today)) {
                showToast('تم تسجيل الحضور مسبقاً اليوم!', 'warning');
                return;
            }

            attendance[memberId].push({
                date: today,
                time: now.toLocaleTimeString('ar-EG'),
                timestamp: now.toISOString()
            });

            localStorage.setItem('gymAttendance', JSON.stringify(attendance));
            showToast('تم تسجيل الحضور بنجاح!', 'success');
            
            // Show attendance details
            showAttendanceDetails(memberId);
            updateStats();
        }

        function quickAttendance(memberId) {
            document.getElementById('attendanceMember').value = memberId;
            showSection('attendance');
            document.querySelectorAll('.nav-tab')[3].classList.add('active');
            document.querySelectorAll('.nav-tab')[0].classList.remove('active');
            showAttendanceDetails(memberId);
        }

        function showAttendanceDetails(memberId) {
            const member = members.find(m => m.id == memberId);
            if (!member) return;

            document.getElementById('attendanceDetails').style.display = 'block';
            
            // Calendar view
            const calendar = document.getElementById('attendanceCalendar');
            const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            const memberAttendance = attendance[memberId] || [];
            
            let calendarHTML = '';
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isPresent = memberAttendance.some(a => a.date === dateStr);
                const isToday = dateStr === new Date().toISOString().split('T')[0];
                
                calendarHTML += `
                    <div class="calendar-day ${isPresent ? 'present' : ''} ${isToday ? 'today' : ''}" 
                         title="${isPresent ? 'حاضر' : 'غائب'}">
                        ${i}
                    </div>
                `;
            }
            calendar.innerHTML = calendarHTML;

            // List view
            const list = document.getElementById('attendanceList');
            if (memberAttendance.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #888;">لا يوجد سجل حضور</p>';
            } else {
                list.innerHTML = memberAttendance.slice().reverse().map(a => `
                    <div class="attendance-item">
                        <span>${new Date(a.date).toLocaleDateString('ar-EG')}</span>
                        <span style="color: var(--success); font-weight: bold;">${a.time}</span>
                    </div>
                `).join('');
            }
        }

        document.getElementById('attendanceMember').addEventListener('change', function() {
            if (this.value) {
                showAttendanceDetails(this.value);
            } else {
                document.getElementById('attendanceDetails').style.display = 'none';
            }
        });

        // View Member Details
        function viewMember(id) {
            const member = members.find(m => m.id === id);
            if (!member) return;

            const isExpired = new Date(member.endDate) < new Date();
            const memberAttendance = attendance[id] || [];
            const presentDays = memberAttendance.length;

            document.getElementById('modalBody').innerHTML = `
                <div style="margin-bottom: 1.5rem;">
                    <h2 style="color: var(--primary); margin-bottom: 0.5rem;">${member.name}</h2>
                    <p style="color: #888;">${member.phone}</p>
                </div>
                
                <div style="display: grid; gap: 1rem; margin-bottom: 1.5rem;">
                    <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                        <div style="color: #888; font-size: 0.9rem;">تاريخ الاشتراك</div>
                        <div>${member.startDate} إلى ${member.endDate}</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                        <div style="color: #888; font-size: 0.9rem;">الحالة</div>
                        <div style="color: ${isExpired ? 'var(--danger)' : 'var(--success)'}; font-weight: bold;">
                            ${isExpired ? 'منتهي' : 'نشط'}
                        </div>
                    </div>
                    <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                        <div style="color: #888; font-size: 0.9rem;">المبالغ المالية</div>
                        <div>الإجمالي: ${member.totalAmount} ج.م | مدفوع: ${member.paidAmount} | متبقي: ${member.remainingAmount}</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                        <div style="color: #888; font-size: 0.9rem;">أيام الحضور</div>
                        <div style="font-size: 1.5rem; color: var(--success); font-weight: bold;">${presentDays} يوم</div>
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="closeModal()" style="width: 100%;">إغلاق</button>
            `;
            
            document.getElementById('memberModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('memberModal').classList.remove('active');
        }

        // Delete Member
        function deleteMember(id) {
            if (confirm('هل أنت متأكد من حذف هذا المشترك؟')) {
                members = members.filter(m => m.id !== id);
                delete attendance[id];
                localStorage.setItem('gymMembers', JSON.stringify(members));
                localStorage.setItem('gymAttendance', JSON.stringify(attendance));
                renderMembers();
                updateStats();
                showToast('تم الحذف بنجاح', 'success');
            }
        }

        // Update Statistics
        function updateStats() {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            
            // Basic counts
            document.getElementById('totalMembers').textContent = members.length;
            
            const activeCount = members.filter(m => new Date(m.endDate) >= now).length;
            document.getElementById('activeMembers').textContent = activeCount;
            
            // Today's attendance
            let todayCount = 0;
            Object.values(attendance).forEach(arr => {
                if (arr.some(a => a.date === today)) todayCount++;
            });
            document.getElementById('todayAttendance').textContent = todayCount;
            
            // Financial stats
            const totalRevenue = members.reduce((sum, m) => sum + m.paidAmount, 0);
            document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString();
            
            // Expiring soon (7 days)
            const expiringSoon = members.filter(m => {
                const daysLeft = Math.ceil((new Date(m.endDate) - now) / (1000 * 60 * 60 * 24));
                return daysLeft > 0 && daysLeft <= 7;
            }).length;
            document.getElementById('expiringSoon').textContent = expiringSoon;
            
            // Expired
            const expired = members.filter(m => new Date(m.endDate) < now).length;
            document.getElementById('expiredCount').textContent = expired;
            
            // Monthly revenue
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            const monthlyRevenue = members
                .filter(m => {
                    const d = new Date(m.createdAt);
                    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
                })
                .reduce((sum, m) => sum + m.paidAmount, 0);
            document.getElementById('monthlyRevenue').textContent = monthlyRevenue.toLocaleString();
            
            // Recent activity
            updateRecentActivity();
        }

        function updateRecentActivity() {
            const container = document.getElementById('recentActivity');
            const activities = [];
            
            // Add recent members
            members.slice(-5).reverse().forEach(m => {
                activities.push({
                    date: new Date(m.createdAt),
                    text: `تم تسجيل مشترك جديد: ${m.name}`,
                    type: 'new'
                });
            });
            
            // Add recent attendance
            Object.entries(attendance).forEach(([memberId, records]) => {
                const member = members.find(m => m.id == memberId);
                if (member) {
                    records.slice(-3).forEach(r => {
                        activities.push({
                            date: new Date(r.timestamp),
                            text: `حضور: ${member.name}`,
                            type: 'attendance'
                        });
                    });
                }
            });
            
            // Sort by date
            activities.sort((a, b) => b.date - a.date);
            
            if (activities.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #888; padding: 2rem;">لا توجد نشاطات حديثة</p>';
                return;
            }
            
            container.innerHTML = activities.slice(0, 10).map(a => `
                <div style="padding: 1rem; background: rgba(255,255,255,0.05); margin-bottom: 0.5rem; border-radius: 8px; border-right: 3px solid ${a.type === 'new' ? 'var(--primary)' : 'var(--success)'};">
                    <div style="font-size: 0.8rem; color: #888; margin-bottom: 0.3rem;">
                        ${a.date.toLocaleString('ar-EG')}
                    </div>
                    <div>${a.text}</div>
                </div>
            `).join('');
        }

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('memberModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                self.addEventListener('install', e => {
                    e.waitUntil(self.skipWaiting());
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => {
                        return new Response('Offline Mode');
                    }));
                });
            `)).catch(() => console.log('SW registration skipped'));
        }
    </script>
</body>
</html>
